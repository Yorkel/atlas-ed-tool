<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>AtlasED — Under redevelopment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --ocean: #1a5e7a; --ink: #1a2730; --muted: #5b6b75; --bg: #f7f9fa; }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            max-width: 540px;
            width: 100%;
            text-align: center;
            background: #fff;
            border: 1px solid #e3e9ec;
            border-radius: 16px;
            padding: 56px 40px;
            box-shadow: 0 8px 30px rgba(26, 39, 48, 0.06);
        }
        .mark {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 2rem;
            font-weight: 600;
            color: var(--ocean);
            letter-spacing: -0.01em;
            margin: 0 0 4px;
        }
        .sub { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 32px; }
        h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 12px; }
        p { font-size: 1rem; line-height: 1.6; color: var(--muted); margin: 0 auto; max-width: 420px; }
        .rule { width: 48px; height: 3px; background: var(--ocean); border-radius: 2px; margin: 28px auto 0; opacity: 0.85; }
    </style>
</head>
<body>
    <main class="card">
        <p class="mark">AtlasED</p>
        <p class="sub">Specification Transparency Dashboard</p>
        <h1>Under redevelopment</h1>
        <p>AtlasED is currently being redeveloped. A new version is coming soon — thank you for your patience.</p>
        <div class="rule"></div>
    </main>
</body>
</html>
